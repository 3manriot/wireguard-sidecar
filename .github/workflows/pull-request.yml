---
name: Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'GitVersion.yml'

jobs:
  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yml

  version:
    name: Version dry run
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      semver: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8  # v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8  # v4.5.0

      - name: Show version
        run: |
          echo "Dry run — would create: ${{ steps.gitversion.outputs.majorMinorPatch }}+${{ github.run_number }}"

  build:
    needs: version
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push.yml
    with:
      semver: ${{ needs.version.outputs.semver }}
