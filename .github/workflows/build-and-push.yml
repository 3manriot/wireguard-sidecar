---
name: Build and Push

on:
  workflow_call:
    inputs:
      push_image:
        description: 'Whether to push the built image to the registry'
        required: false
        type: boolean
        default: false
      semver:
        description: 'Semantic version to tag the image with (e.g. 0.3.1)'
        required: false
        type: string
        default: ''

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: wireguard-sidecar
  IMAGE_REF: ghcr.io/${{ github.repository_owner }}/wireguard-sidecars

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          SEMVER="${{ inputs.semver }}"
          SHA="sha-$(echo "${{ github.sha }}" | cut -c1-7)"
          if [ -n "$SEMVER" ]; then
            MAJOR_MINOR="$(echo "$SEMVER" | cut -d. -f1,2)"
            MAJOR="$(echo "$SEMVER" | cut -d. -f1)"
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE_REF }}:${SEMVER}"
              echo "${{ env.IMAGE_REF }}:${MAJOR_MINOR}"
              echo "${{ env.IMAGE_REF }}:${MAJOR}"
              echo "${{ env.IMAGE_REF }}:${SHA}"
              echo "${{ env.IMAGE_REF }}:latest"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            {
              echo "tags<<EOF"
              echo "${{ env.IMAGE_REF }}:latest"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: ${{ inputs.push_image }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
